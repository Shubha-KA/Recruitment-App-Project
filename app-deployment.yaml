apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitment-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recruitment
  template:
    metadata:
      labels:
        app: recruitment
    spec:
      containers:
        - name: recruitment-app-container
          image: shubha20/recruitment-app-project_app:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: recruitment-config

---
apiVersion: v1
kind: Service
metadata:
  name: recruitment-service
spec:
  selector:
    app: recruitment
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: NodePort        