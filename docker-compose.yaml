version: "3.9"

services:

  gateway:
    image: nginx:latest
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - frontend-net

  app:
    build: .
    container_name: recruitment-app
    depends_on:
      - mongodb
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - frontend-net
      - backend-net

  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: rootuser
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-net

networks:
  frontend-net:
  backend-net:

volumes:
  mongo-data:
